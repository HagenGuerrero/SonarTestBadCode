name: SonarQube — Scan & Batch Issues

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      project_keys:
        description: 'SonarQube project keys (comma-separated)'
        required: false
        default: 'sonar-test-bad-code'
      severity_blocker:
        description: 'Include BLOCKER issues'
        type: boolean
        default: true
      severity_critical:
        description: 'Include CRITICAL issues'
        type: boolean
        default: true
      severity_major:
        description: 'Include MAJOR issues'
        type: boolean
        default: true
      severity_minor:
        description: 'Include MINOR issues'
        type: boolean
        default: true
      severity_info:
        description: 'Include INFO issues'
        type: boolean
        default: true
      language_filter:
        description: 'SonarQube language key (e.g. cs, java, py)'
        required: false
        default: 'cs'
      max_files:
        description: 'Max files to batch (0 = unlimited)'
        required: false
        default: '0'
      quality_profile_path:
        description: 'Repo-relative path to the quality profile XML'
        required: false
        default: 'sonar/quality-profile-cs.xml'
      solution_path:
        description: 'Repo-relative path to the .sln or .csproj to build'
        required: false
        default: 'SonarTestBadCode.sln'

# Cancel any in-flight run for the same branch so only the latest push wins.
concurrency:
  group: sonar-batch-${{ github.ref }}
  cancel-in-progress: true

# Read-only: no commits, no PRs — artifacts are the only output.
permissions:
  contents: read

jobs:
  sonar-batch:
    runs-on: ubuntu-latest

    services:
      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000
        # No health-cmd — the JRE base image has no curl/wget.
        # Readiness is polled from the runner in the wait step below.

    steps:
      # -----------------------------------------------------------------------
      # Toolchain setup
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java 17 (required by SonarScanner backend)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dotnet-sonarscanner
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: pip install requests

      - name: Install Mono MSBuild (official Mono Project repo — Ubuntu apt lacks mono-msbuild)
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
          echo "deb https://download.mono-project.com/repo/ubuntu stable-focal main" \
            | sudo tee /etc/apt/sources.list.d/mono-official-stable.list
          sudo apt-get update -qq
          sudo apt-get install -y mono-devel

      # -----------------------------------------------------------------------
      # Bootstrap — wait for SonarQube, generate token, create project
      # SonarQube 9.9.x LTS: admin:admin works on a fresh ephemeral instance.
      # Use sonar.login (not sonar.token) — sonar.token is 10.x syntax.
      # Use projectKeys (not componentKeys) in REST API — returns full result set.
      # -----------------------------------------------------------------------
      - name: Wait for SonarQube to be fully UP
        run: |
          echo "Polling SonarQube status endpoint..."
          STATUS=""
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:9000/api/system/status \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            echo "  attempt $i: '$STATUS'"
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is UP"
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "UP" ]; then
            echo "SonarQube never became UP after 30 attempts"
            exit 1
          fi

      - name: Bootstrap — generate token and create project
        run: |
          # Create a SonarQube project for each key in the comma-separated list
          PROJECT_KEYS="${{ inputs.project_keys || 'sonar-test-bad-code' }}"
          for KEY in $(echo "$PROJECT_KEYS" | tr ',' '\n'); do
            KEY=$(echo "$KEY" | xargs)  # trim whitespace
            curl -s -X POST -u "admin:admin" \
              "http://localhost:9000/api/projects/create" \
              -d "project=${KEY}&name=${KEY}" > /dev/null || true
            echo "Project created (or already exists): ${KEY}"
          done

          TOKEN_JSON=$(curl -sf -X POST -u "admin:admin" \
            "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci-token-${{ github.run_number }}")
          TOKEN=$(echo "$TOKEN_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['token'])")

          echo "SONARQUBE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Bootstrap complete — token and project ready"

      - name: Import quality profile
        run: |
          PROFILE_PATH="${{ inputs.quality_profile_path || 'sonar/quality-profile-cs.xml' }}"
          LANGUAGE="${{ inputs.language_filter || 'cs' }}"
          PROFILE_NAME="CI-Profile-${LANGUAGE}"

          # "Sonar way" is a built-in read-only profile — rename before uploading.
          sed "s|<name>Sonar way</name>|<name>${PROFILE_NAME}</name>|" \
            "${PROFILE_PATH}" > /tmp/ci-profile.xml

          curl -sf -X POST -u "admin:admin" \
            "http://localhost:9000/api/qualityprofiles/restore" \
            -F "backup=@/tmp/ci-profile.xml"

          curl -sf -X POST -u "admin:admin" \
            "http://localhost:9000/api/qualityprofiles/set_default" \
            --data-urlencode "language=${LANGUAGE}" \
            --data-urlencode "qualityProfile=${PROFILE_NAME}"

          echo "Quality profile '${PROFILE_NAME}' imported and set as default for ${LANGUAGE}"

      # -----------------------------------------------------------------------
      # SonarQube scan
      # The scanner registers a single project key; use the first in the list.
      # Multi-project fetching is handled downstream by fetch_issues.py.
      # -----------------------------------------------------------------------
      - name: SonarScanner begin
        run: |
          FIRST_KEY=$(echo "${{ inputs.project_keys || 'sonar-test-bad-code' }}" \
            | cut -d',' -f1 | xargs)
          dotnet sonarscanner begin \
            /k:"${FIRST_KEY}" \
            /d:sonar.host.url="http://localhost:9000" \
            /d:sonar.login="$SONARQUBE_TOKEN" \
            /d:sonar.exclusions="scripts/**,output/**"

      - name: Build
        env:
          FrameworkPathOverride: /usr/lib/mono/4.8-api/
        run: |
          dotnet msbuild "${{ inputs.solution_path || 'SonarTestBadCode.sln' }}" \
            /p:Configuration=Release

      - name: SonarScanner end
        run: dotnet sonarscanner end /d:sonar.login="$SONARQUBE_TOKEN"

      - name: Wait for SonarQube CE task to complete
        run: |
          CE_TASK_URL=$(python3 - << 'PYEOF'
          props = {}
          with open('.sonarqube/out/.sonar/report-task.txt') as f:
              for line in f:
                  line = line.strip()
                  if '=' in line and not line.startswith('#'):
                      k, v = line.split('=', 1)
                      props[k] = v.replace('\\:', ':').replace('\\=', '=').replace('\\/', '/')
          print(props.get('ceTaskUrl', ''))
          PYEOF
          )

          echo "Polling CE task: $CE_TASK_URL"
          STATUS=""
          for i in $(seq 1 36); do
            STATUS=$(curl -sf -u "$SONARQUBE_TOKEN:" "$CE_TASK_URL" \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['task']['status'])")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILED" ]; then echo "CE task FAILED"; exit 1; fi
            sleep 5
          done
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "CE task timed out after 36 attempts"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Fetch and batch issues
      # -----------------------------------------------------------------------
      - name: Build severity filter
        id: severities
        run: |
          # When triggered by push, boolean inputs are empty strings.
          # ${VAR:-true} defaults each flag to true so all severities are included.
          BLOCKER="${{ inputs.severity_blocker }}"
          CRITICAL="${{ inputs.severity_critical }}"
          MAJOR="${{ inputs.severity_major }}"
          MINOR="${{ inputs.severity_minor }}"
          INFO="${{ inputs.severity_info }}"

          SEVS=""
          [ "${BLOCKER:-true}"  = "true" ] && SEVS="${SEVS}BLOCKER,"
          [ "${CRITICAL:-true}" = "true" ] && SEVS="${SEVS}CRITICAL,"
          [ "${MAJOR:-true}"    = "true" ] && SEVS="${SEVS}MAJOR,"
          [ "${MINOR:-true}"    = "true" ] && SEVS="${SEVS}MINOR,"
          [ "${INFO:-true}"     = "true" ] && SEVS="${SEVS}INFO,"
          SEVS="${SEVS%,}"
          [ -z "$SEVS" ] && SEVS="BLOCKER,CRITICAL,MAJOR,MINOR,INFO"
          echo "value=$SEVS" >> "$GITHUB_OUTPUT"
          echo "Severity filter: $SEVS"

      - name: Fetch issues from SonarQube
        env:
          SONARQUBE_URL: http://localhost:9000
          SONAR_PROJECT_KEYS: ${{ inputs.project_keys || 'sonar-test-bad-code' }}
          SONAR_SEVERITIES: ${{ steps.severities.outputs.value }}
          SONAR_LANGUAGE: ${{ inputs.language_filter || 'cs' }}
        run: python scripts/sonar/fetch_issues.py

      - name: Batch issues by file
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          MAX_FILES: ${{ inputs.max_files || '0' }}
          SCAN_COMMIT_SHA: ${{ github.sha }}
        run: python scripts/sonar/batch_issues.py

      # -----------------------------------------------------------------------
      # Publish artifacts — no git commits, no PRs.
      # Downstream fix workflows download these by artifact name or run_id,
      # both of which are printed in the step summary below.
      # -----------------------------------------------------------------------
      - name: Upload batch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonar-batch-${{ github.sha }}-run-${{ github.run_number }}
          path: output/
          retention-days: 7

      - name: Write step summary
        if: always()
        run: |
          ISSUES_COUNT=$(python3 -c \
            "import json; d=json.load(open('output/issues.json')); print(d['total_fetched'])" \
            2>/dev/null || echo "N/A")
          BATCHES_COUNT=$(python3 -c \
            "import json; d=json.load(open('output/batches.json')); print(d['total_batches'])" \
            2>/dev/null || echo "N/A")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## SonarQube Batch — Run #${{ github.run_number }}

          | Metric | Value |
          |--------|-------|
          | Commit | \`${{ github.sha }}\` |
          | Branch | \`${{ github.ref_name }}\` |
          | Issues fetched | ${ISSUES_COUNT} |
          | Batches created | ${BATCHES_COUNT} |
          | Severities | ${{ steps.severities.outputs.value }} |
          | Language | ${{ inputs.language_filter || 'cs' }} |
          | Artifact | \`sonar-batch-${{ github.sha }}-run-${{ github.run_number }}\` |
          | Run ID | \`${{ github.run_id }}\` |

          > Pass the **Run ID** to a downstream fix workflow via \`workflow_dispatch\` to consume these artifacts without re-scanning.
          EOF
