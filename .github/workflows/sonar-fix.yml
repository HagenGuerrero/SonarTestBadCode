name: SonarQube — Scan, Batch & AI Auto-Fix

on:
  workflow_dispatch:
    inputs:
      project_keys:
        description: 'SonarQube project keys (comma-separated)'
        required: false
        default: 'sonar-test-bad-code'
      severity_blocker:
        description: 'Include BLOCKER issues'
        type: boolean
        default: true
      severity_critical:
        description: 'Include CRITICAL issues'
        type: boolean
        default: true
      severity_major:
        description: 'Include MAJOR issues'
        type: boolean
        default: true
      severity_minor:
        description: 'Include MINOR issues'
        type: boolean
        default: true
      severity_info:
        description: 'Include INFO issues'
        type: boolean
        default: true
      language_filter:
        description: 'SonarQube language key'
        required: false
        default: 'cs'
      max_files:
        description: 'Max files to batch (0 = unlimited)'
        required: false
        default: '0'
      max_issues_per_call:
        description: 'Max issues per AI call — lower value reduces hallucination risk'
        required: false
        default: '15'
      run_copilot_agent:
        description: 'Fire Copilot Agent Tasks for skipped files (requires COPILOT_PAT)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  models: read
  issues: write

jobs:
  sonar-fix:
    # Only run when dispatched from the agent/fix branch.
    if: github.ref == 'refs/heads/agent/fix'
    runs-on: ubuntu-latest

    services:
      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000

    steps:
      # -----------------------------------------------------------------------
      # Toolchain setup
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java 17 (required by SonarScanner backend)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dotnet-sonarscanner
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: pip install requests

      - name: Install Mono MSBuild (official Mono Project repo — Ubuntu apt lacks mono-msbuild)
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
          echo "deb https://download.mono-project.com/repo/ubuntu stable-focal main" \
            | sudo tee /etc/apt/sources.list.d/mono-official-stable.list
          sudo apt-get update -qq
          sudo apt-get install -y mono-devel

      # -----------------------------------------------------------------------
      # Bootstrap — wait for SonarQube, generate token, create project
      # -----------------------------------------------------------------------
      - name: Wait for SonarQube to be fully UP
        run: |
          echo "Polling SonarQube status endpoint..."
          STATUS=""
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:9000/api/system/status \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            echo "  attempt $i: '$STATUS'"
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is UP"
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "UP" ]; then
            echo "SonarQube never became UP after 30 attempts"
            exit 1
          fi

      - name: Bootstrap — generate token and create project
        run: |
          TOKEN_JSON=$(curl -sf -X POST -u "admin:admin" \
            "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci-token-${{ github.run_number }}")
          TOKEN=$(echo "$TOKEN_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['token'])")

          curl -s -X POST -u "admin:admin" \
            "http://localhost:9000/api/projects/create" \
            -d "project=sonar-test-bad-code&name=SonarTestBadCode" > /dev/null || true

          echo "SONARQUBE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Bootstrap complete — token and project ready"

      - name: Import quality profile
        run: |
          sed 's|<name>Sonar way</name>|<name>CI-Profile-cs</name>|' \
            sonar/quality-profile-cs.xml > /tmp/ci-profile-cs.xml

          curl -sf -X POST -u "admin:admin" \
            "http://localhost:9000/api/qualityprofiles/restore" \
            -F "backup=@/tmp/ci-profile-cs.xml"

          curl -sf -X POST -u "admin:admin" \
            "http://localhost:9000/api/qualityprofiles/set_default" \
            --data-urlencode "language=cs" \
            --data-urlencode "qualityProfile=CI-Profile-cs"

          echo "Quality profile 'CI-Profile-cs' imported and set as default for C#"

      # -----------------------------------------------------------------------
      # SonarQube scan
      # -----------------------------------------------------------------------
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: SonarScanner begin
        run: |
          dotnet sonarscanner begin \
            /k:"sonar-test-bad-code" \
            /d:sonar.host.url="http://localhost:9000" \
            /d:sonar.login="$SONARQUBE_TOKEN" \
            /d:sonar.exclusions="scripts/**,output/**"

      - name: Build (.NET Framework 4.8 via Mono MSBuild)
        env:
          FrameworkPathOverride: /usr/lib/mono/4.8-api/
        run: dotnet msbuild SonarTestBadCode.sln /p:Configuration=Release

      - name: SonarScanner end
        run: dotnet sonarscanner end /d:sonar.login="$SONARQUBE_TOKEN"

      - name: Wait for SonarQube CE task to complete
        run: |
          CE_TASK_URL=$(python3 - << 'PYEOF'
          props = {}
          with open('.sonarqube/out/.sonar/report-task.txt') as f:
              for line in f:
                  line = line.strip()
                  if '=' in line and not line.startswith('#'):
                      k, v = line.split('=', 1)
                      props[k] = v.replace('\\:', ':').replace('\\=', '=').replace('\\/', '/')
          print(props.get('ceTaskUrl', ''))
          PYEOF
          )

          echo "Polling CE task: $CE_TASK_URL"
          STATUS=""
          for i in $(seq 1 36); do
            STATUS=$(curl -sf -u "$SONARQUBE_TOKEN:" "$CE_TASK_URL" \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['task']['status'])")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILED" ]; then echo "CE task FAILED"; exit 1; fi
            sleep 5
          done
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "CE task timed out after 36 attempts"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Fetch and batch issues
      # -----------------------------------------------------------------------
      - name: Build severity filter
        id: severities
        run: |
          SEVS=""
          [ "${{ inputs.severity_blocker }}"  = "true" ] && SEVS="${SEVS}BLOCKER,"
          [ "${{ inputs.severity_critical }}" = "true" ] && SEVS="${SEVS}CRITICAL,"
          [ "${{ inputs.severity_major }}"    = "true" ] && SEVS="${SEVS}MAJOR,"
          [ "${{ inputs.severity_minor }}"    = "true" ] && SEVS="${SEVS}MINOR,"
          [ "${{ inputs.severity_info }}"     = "true" ] && SEVS="${SEVS}INFO,"
          SEVS="${SEVS%,}"
          [ -z "$SEVS" ] && SEVS="BLOCKER,CRITICAL,MAJOR,MINOR,INFO"
          echo "value=$SEVS" >> "$GITHUB_OUTPUT"
          echo "Severity filter: $SEVS"

      - name: Fetch issues from SonarQube
        env:
          SONARQUBE_URL: http://localhost:9000
          SONAR_PROJECT_KEYS: ${{ inputs.project_keys }}
          SONAR_SEVERITIES: ${{ steps.severities.outputs.value }}
          SONAR_LANGUAGE: ${{ inputs.language_filter }}
        run: python scripts/sonar/fetch_issues.py

      - name: Batch issues by file
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          MAX_FILES: ${{ inputs.max_files }}
        run: python scripts/sonar/batch_issues.py

      # -----------------------------------------------------------------------
      # AI fix loop + PR creation
      # -----------------------------------------------------------------------
      - name: AI fix batches
        id: fix
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_ISSUES_PER_CALL: ${{ inputs.max_issues_per_call }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          python scripts/ai/fix_batch.py
          EXIT=$?
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          # exit 2 = all skipped (non-fatal) — treat as success for the step
          # exit 3 = fatal — fail the step
          [ $EXIT -eq 3 ] && exit 1 || exit 0

      - name: Upload output and fix results as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonar-fix-run-${{ github.run_number }}
          path: output/

      - name: Create fix PR
        if: steps.fix.outputs.exit_code != '3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_BASE_BRANCH: agent/fix
          FIX_EXIT_CODE: ${{ steps.fix.outputs.exit_code }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: python scripts/git/create_pr.py

      # Create Copilot Agent Tasks for any batches that fix_batch.py could not fix.
      # Requires COPILOT_PAT secret: fine-grained PAT with actions:write,
      # contents:write, issues:write, pull-requests:write.
      # GITHUB_TOKEN is explicitly rejected by the Agent Tasks API (billing is
      # user-level). Skips gracefully when the secret is absent.
      - name: Create Copilot Agent Tasks for skipped files
        if: steps.fix.outputs.exit_code != '3' && inputs.run_copilot_agent == 'true'
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_BASE_BRANCH: agent/fix
        run: python scripts/ai/create_copilot_tasks.py
